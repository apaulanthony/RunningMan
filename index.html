<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Man</title>
    <link rel="stylesheet" href="node_modules/ol/ol.css">
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div id="map" class="map">
      <div id="pause-overlay" class="pause-overlay"></div>
    </div>
    <div id="timers" class="timers">
      <div id="duration-timer">00:00:00</div>
      <div id="pause-timer" style="display: none;">Pause: 00:00:00</div>
    </div>
    <div id="start-container">
      <button id="start" class="start-btn">🏃 START</button>
    </div>
    <div id="footer" class="footer">
      <button id="pause" class="pause-btn">PAUSE</button>
      <button id="stop" class="stop-btn">STOP</button>
    </div>
  </body>
</html>
