<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#22c55e" />
		<meta name="description" content="Track your runs with GPS and see them on a map" />
		<link rel="manifest" href="./manifest.json" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<title>🏃 Running Man</title>    
		<link rel="stylesheet" href="node_modules/ol/ol.css" />
		<link rel="stylesheet" href="scss/styles.scss" />
		<script type="module" src="js/App.js" defer></script>
	</head>
	<body>
		<div id="start-container">
			<button id="start">🏃 START</button>
		</div>

		<div id="map">
			<div id="timers" style="display: none;">
				<div id="duration-timer">00:00</div>
				<div id="pause-timer">Paused: 00:00</div>
			</div>

			<div id="pause-overlay" style="display: none;">
				<button id="resume">RESUME</button>
			</div>
		</div>

		<div id="history-container" class="button-container">
			<button id="history">HISTORY</button>
			<button id="clear-history">⚠️ CLEAR</button>
		</div>

		<div id="action-container" class="button-container" style="display: none;">
			<button id="pause">PAUSE</button>
			<button id="stop">STOP</button>
		</div>
	</body>
</html>
