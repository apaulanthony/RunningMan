<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Running Man</title>    
    <link rel="stylesheet" href="node_modules/ol/ol.css" />
    <link rel="stylesheet" href="scss/styles.scss" />
    <script type="module" src="js/main.js" defer></script>
  </head>
  <body>
    <div id="map" class="map">
      <div id="pause-overlay" class="pause-overlay">
        <button id="resume" class="resume-btn">RESUME</button>
      </div>
    </div>
    <div id="timers" class="timers">
      <div>Elapsed: <span id="duration-timer">00:00</span></div>
      <div style="display: none;">Pause: <span id="pause-timer">00:00</span></div>
    </div>
    <div id="start-container">
      <button id="start" class="start-btn">🏃 START</button>
    </div>
    <div id="footer" class="footer">
      <button id="pause" class="pause-btn">PAUSE</button>
      <button id="stop" class="stop-btn">STOP</button>
    </div>
  </body>
</html>
