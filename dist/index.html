<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>🏃 Running Man</title>    
		<script type="module" crossorigin src="/assets/index-f1w2TAEd.js"></script>
		<link rel="stylesheet" crossorigin href="/assets/index-Ua5Tdk6y.css">
	</head>
	<body>
		<div id="map">
			<div id="timers" style="display: none;">
				<div id="duration-timer">00:00</div>
				<div id="pause-timer">Paused: 00:00</div>
			</div>

			<div id="start-container">
				<button id="start">🏃 START</button>
			</div>

			<div id="pause-overlay" style="display: none;">
				<button id="resume">RESUME</button>
			</div>
		</div>

		<div id="button-container" style="display: none;">
			<button id="pause">PAUSE</button>
			<button id="stop">STOP</button>
		</div>

		<dialog id="stop-dialog">
			<p>Are you sure you want to stop the run?</p>
			<div class="dialog-controls">
				<button id="stop-confirm" class="confirm-btn">Yes</button>
				<button id="stop-cancel" class="cancel-btn">No</button>
			</div>
		</dialog>

		<dialog id="summary-dialog">
			<p id="summary-content">Run summary goes here</p>
			<div class="dialog-controls">
				<button id="summary-close" class="confirm-btn">Close</button>
			</div>
		</dialog>
	</body>
</html>
